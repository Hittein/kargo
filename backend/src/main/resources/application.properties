spring.application.name=kargo-api
server.port=${PORT:8080}

# Default = dev, in prod we set SPRING_PROFILES_ACTIVE=prod via Render env.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Dev profile uses H2 in-memory; prod overrides via SPRING_DATASOURCE_URL (entrypoint.sh).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:kargo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 console for dev only.
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2

# JWT — dev default. Prod MUST override JWT_SECRET (>=32 chars).
kargo.jwt.secret=${JWT_SECRET:devSecretChangeMeChangeMeChangeMeChangeMeChangeMe1234567890!!}
kargo.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:3600000}
kargo.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS — dev permissive, prod restricted via env.
kargo.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Simulated OTP toggle. Production may flip to false once a real SMS provider is wired.
kargo.otp.simulate=${OTP_SIMULATE:true}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

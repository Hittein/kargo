services:
  - type: web
    name: kargo-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: kargo-db
          property: connectionString
      # Generated once on first deploy. Never commit a real secret here.
      # To rotate: flip `sync: false` then set the value via the Render dashboard.
      - key: JWT_SECRET
        generateValue: true
      # En V1 on accepte tous les origines (admin Render obtient un suffixe random,
      # localhost pour dev, Vercel preview, etc.). En prod stricte, lister les
      # domaines effectifs.
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: H2_CONSOLE_ENABLED
        value: "false"
      - key: OTP_SIMULATE
        value: "true"
      - key: JWT_ACCESS_EXPIRATION
        value: "3600000"

  - type: web
    name: kargo-admin
    runtime: node
    rootDir: admin
    plan: free
    buildCommand: npm ci && npm run build
    # Render injecte PORT — on laisse next démarrer dessus. -p $PORT override
    # le port hardcodé du package.json (3030, OK pour local dev mais Render
    # attend que le process écoute sur $PORT).
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Full URL including /api/v1 suffix (admin/lib/api.ts does NOT append).
      # Si tu renommes kargo-api ou migres l'URL, mets à jour cette valeur.
      - key: NEXT_PUBLIC_API_URL
        value: https://kargo-api-g00w.onrender.com/api/v1

databases:
  - name: kargo-db
    # Render n'autorise qu'1 DB plan free par workspace (déjà pris par
    # wallety-db). basic-256mb = ~$6/mois, suffisant pour le démarrage.
    plan: basic-256mb
    databaseName: kargo
    user: kargo
